<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Booking System</title>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 15px; }
        .container { max-width: 450px; background: #fff; padding: 20px; border-radius: 15px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slot-info { text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 20px; background: #ebf5ee; padding: 10px; border-radius: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .admin-panel { display: none; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .booking-card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .status-dah { border-left: 8px solid var(--primary); }
        .status-belum { border-left: 8px solid var(--warning); opacity: 0.8; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 5px; color: white; float: right; }
        .bg-warning { background: var(--warning); }
        .bg-success { background: var(--primary); }
        .btn-confirm { background: var(--dark); font-size: 11px; padding: 8px; margin-top: 10px; width: auto; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="bookingForm">
        <h2 style="text-align:center;">Urut & Bekam Pro</h2>
        <div class="slot-info">Baki Slot (Sah): <span id="bakiSlot">...</span></div>
        
        <label>Nama:</label>
        <input type="text" id="nama" placeholder="Taip nama / kod rahsia">

        <label>Servis:</label>
        <select id="servis">
            <option value="Urut Badan">Urut Badan</option>
            <option value="Bekam Sunnah">Bekam Sunnah</option>
        </select>

        <label>Pilih Waktu (Slot Tersedia):</label>
        <select id="slotMasa">
            </select>

        <button id="btnTempah" onclick="prosesTempahan()">Tempah & WhatsApp</button>
    </div>

    <div class="admin-panel" id="adminBox">
        <h3 style="text-align:center;">🛡️ Dashboard Admin</h3>
        <div id="loginAdmin">
            <input type="password" id="passInput" placeholder="Password Admin">
            <button onclick="checkAdmin()" style="background:var(--dark);">Login</button>
        </div>
        <div id="adminContent" style="display:none;">
            <div id="senaraiNama">Memuatkan...</div>
            <button onclick="db.ref('tempahan').remove().then(()=>location.reload())" style="background:var(--danger); margin-top:20px;">Reset Semua</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnP56js1YcyNg61XCnJ93aVUB0JaGonEo",
        authDomain: "urutpro-239355.firebaseapp.com",
        projectId: "urutpro-239355",
        storageBucket: "urutpro-239355.appspot.com",
        messagingSenderId: "473336835724",
        appId: "1:473336835724:web:348a6490b0051d278fd5a9",
        databaseURL: "https://urutpro-239355-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Senarai masa asal (Kau boleh tambah/tukar kat sini)
    const senaraiMasaAsal = ["02:00 PM", "05:00 PM", "08:00 PM", "10:00 PM", "12:00 AM"];

    // --- FUNGSI UTAMA: UPDATE SLOT & MASA SECARA REAL-TIME ---
    db.ref('tempahan').on('value', (snap) => {
        const data = snap.val();
        let masaDahAmbil = [];
        let jumlahDahBayar = 0;

        if (data) {
            Object.values(data).forEach(t => {
                if (t.status === "Dah Bayar") {
                    masaDahAmbil.push(t.masa);
                    jumlahDahBayar++;
                }
            });
        }

        // 1. Update Baki Slot
        const baki = 5 - jumlahDahBayar;
        document.getElementById('bakiSlot').innerText = baki + "/5";

        // 2. Filter & Papar Masa Yang Belum Diambil Sahaja
        const slotSelect = document.getElementById('slotMasa');
        slotSelect.innerHTML = ""; // Kosongkan dulu

        senaraiMasaAsal.forEach(masa => {
            if (!masaDahAmbil.includes(masa)) {
                let opt = document.createElement('option');
                opt.value = masa;
                opt.innerText = masa;
                slotSelect.appendChild(opt);
            }
        });

        // 3. Kalau slot habis
        if (baki <= 0) {
            document.getElementById('btnTempah').disabled = true;
            document.getElementById('btnTempah').innerText = "Slot Penuh";
            document.getElementById('btnTempah').style.background = "#bdc3c7";
        } else {
            document.getElementById('btnTempah').disabled = false;
            document.getElementById('btnTempah').innerText = "Tempah & WhatsApp";
            document.getElementById('btnTempah').style.background = "var(--primary)";
        }
    });

    function prosesTempahan() {
        const nama = document.getElementById('nama').value.trim();
        const noWA = "601118680063"; 

        if (nama.toLowerCase() === "adminpro") {
            document.getElementById('adminBox').style.display = "block";
            document.getElementById('adminBox').scrollIntoView();
            return;
        }

        if(!nama) return alert("Isi nama!");
        
        const selectedMasa = document.getElementById('slotMasa').value;
        if(!selectedMasa) return alert("Tiada slot masa tersedia!");

        const dataTempahan = {
            nama: nama,
            servis: document.getElementById('servis').value,
            masa: selectedMasa,
            status: "Belum Bayar",
            waktu: new Date().toLocaleString()
        };

        db.ref('tempahan').push(dataTempahan).then(() => {
            const text = `Salam, saya ${nama}. Dah booking ${dataTempahan.servis} pukul ${dataTempahan.masa}. Nak bayar kat mana?`;
            window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(text)}`, '_blank');
            location.reload();
        });
    }

    function checkAdmin() {
        if(document.getElementById('passInput').value === "admin123") {
            document.getElementById('loginAdmin').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            loadAdminData();
        } else { alert("Salah!"); }
    }

    function loadAdminData() {
        db.ref('tempahan').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const t = data[id];
                    const isDah = t.status === "Dah Bayar";
                    html += `
                        <div class="booking-card ${isDah ? 'status-dah' : 'status-belum'}">
                            <span class="badge ${isDah ? 'bg-success' : 'bg-warning'}">${t.status}</span>
                            <strong>${t.nama}</strong><br>
                            ${t.servis} (${t.masa})<br>
                            ${!isDah ? `<button class="btn-confirm" onclick="confirmBayar('${id}')">Confirm Bayar ✅</button>` : ''}
                        </div>`;
                });
            } else { html = "Tiada tempahan."; }
            document.getElementById('senaraiNama').innerHTML = html;
        });
    }

    function confirmBayar(id) {
        db.ref('tempahan/' + id).update({ status: "Dah Bayar" });
    }
</script>
</body>
</html>
