<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Fit Love</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .heart-container {
            position: relative;
            /* Container ni kita tetapkan saiz supaya tak lari */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .love-text {
            position: absolute;
            color: #ff2d75;
            font-size: 9px; /* Kecilkan sikit font supaya lebih tajam */
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 8px #ff2d75;
            user-select: none;
            pointer-events: none;
        }

        .bloom {
            animation: bloom-move 3.5s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes bloom-move {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: var(--target) scale(1); opacity: 0; }
        }

        .static {
            animation: pulse 2s infinite ease-in-out;
            transform: var(--target);
            opacity: 0.6;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: var(--target) scale(0.95); }
            50% { opacity: 0.8; transform: var(--target) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>

    <script>
        const heartContainer = document.getElementById('heart');
        const text = "I LOVE YOU";
        
        function createHeart() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            // Pilih saiz yang paling kecil antara lebar atau tinggi supaya tak terkeluar
            // Nilai 45-50 biasanya 'sweet spot' untuk skrin telefon moden
            const minDimension = Math.min(screenWidth, screenHeight);
            const scale = minDimension / 45; 
            
            // Lapisan Tetap (Rangka)
            for (let i = 0; i < 80; i++) {
                drawText(i, 80, scale, 'static');
            }

            // Lapisan Kembang (Spam)
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    drawText(i, 120, scale, 'bloom');
                }, Math.random() * 3000);
            }
        }

        function drawText(i, total, scale, className) {
            const span = document.createElement('span');
            span.className = `love-text ${className}`;
            span.innerText = text;

            const angle = (i / total) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));

            // Koordinat akhir
            const targetX = x * scale;
            const targetY = y * scale;

            span.style.setProperty('--target', `translate(${targetX}px, ${targetY}px)`);
            span.style.animationDelay = (Math.random() * 3) + "s";
            
            heartContainer.appendChild(span);
        }

        createHeart();

        // Elakkan masalah bila orientation berubah
        let resizeTimer;
        window.onresize = () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                heartContainer.innerHTML = '';
                createHeart();
            }, 250);
        };
    </script>
</body>
</html>
