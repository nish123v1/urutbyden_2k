<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Signature Edition</title>
    
    <style>
        /* --- CSS PREMIUM SIGNATURE EDITION --- */
        :root {
            --primary: #047857; 
            --primary-light: #ecfdf5;
            --dark: #111827; 
            --text: #374151; 
            --bg-body: #f8fafc; 
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }
        
        /* Fix untuk pastikan input tak terkeluar skrin */
        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-body);
            color: var(--text); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container { 
            max-width: 440px; 
            width: 100%; 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: var(--shadow-premium);
        }

        h2 { 
            text-align: center; 
            color: var(--dark); 
            font-weight: 800;
            font-size: 2.2em;
            margin: 0 0 5px 0;
            letter-spacing: -1px;
        }
        
        .slot-info { 
            text-align: center; 
            color: var(--primary); 
            font-weight: 700;
            margin-bottom: 30px; 
            background: var(--primary-light); 
            padding: 12px; 
            border-radius: 14px;
            font-size: 0.95em;
            border: 1px solid #d1fae5;
        }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 0.8em; 
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input, select { 
            width: 100%; 
            padding: 14px 18px; 
            margin-bottom: 20px; 
            border: 1px solid #e5e7eb; 
            border-radius: 12px; 
            font-size: 16px; 
            background: #fff;
            outline: none;
        }
        
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            background: var(--primary); 
            color: white; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(4, 120, 87, 0.2);
        }

        button:hover { transform: translateY(-2px); background: #036c4f; }
        button:disabled { background: #d1d5db; transform: none; box-shadow: none; cursor: not-allowed; }

        /* --- ADMIN SECTION --- */
        .admin-panel { display: none; margin-top: 40px; border-top: 1px solid #eee; padding-top: 30px; }
        .booking-card { 
            background: #fff; 
            border: 1px solid #f1f5f9;
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        
        .status-line { position: absolute; left: 0; top: 0; width: 5px; height: 100%; background: #f97316; }
        .status-dah .status-line { background: var(--primary); }
        
        .badge { font-size: 0.7em; padding: 4px 10px; border-radius: 20px; color: white; font-weight: 700; text-transform: uppercase; }
        .bg-orange { background: #f97316; }
        .bg-success { background: var(--primary); }

        .btn-confirm { 
            background: transparent; 
            color: var(--primary); 
            border: 1px solid var(--primary); 
            font-size: 11px; 
            padding: 6px 12px; 
            width: auto; 
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="bookingForm">
        <h2>UrutPro</h2>
        <div class="slot-info">Slot Tersedia: <span id="bakiSlot">...</span></div>
        
        <label>Nama Penuh</label>
        <input type="text" id="nama" placeholder="Taip nama anda">

        <label>Jenis Servis</label>
        <select id="servis">
            <option value="Urut Badan">Urut Badan</option>
            <option value="Bekam Sunnah">Bekam Sunnah</option>
            <option value="Pakej Premium">Pakej Premium</option>
        </select>

        <label>Waktu Temujanji</label>
        <select id="slotMasa"></select>

        <button id="btnTempah" onclick="prosesTempahan()">Sahkan Tempahan</button>
    </div>

    <div class="admin-panel" id="adminBox">
        <h3 style="text-align:center;">Admin Dashboard</h3>
        <div id="loginAdmin">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="checkAdmin()" style="background:var(--dark);">Masuk</button>
        </div>
        <div id="adminContent" style="display:none;">
            <div id="senaraiNama"></div>
            <button onclick="db.ref('tempahan').remove().then(()=>location.reload())" style="background:#ef4444; margin-top:20px;">Reset Sistem</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnP56js1YcyNg61XCnJ93aVUB0JaGonEo",
        authDomain: "urutpro-239355.firebaseapp.com",
        projectId: "urutpro-239355",
        storageBucket: "urutpro-239355.appspot.com",
        messagingSenderId: "473336835724",
        appId: "1:473336835724:web:348a6490b0051d278fd5a9",
        databaseURL: "https://urutpro-239355-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const senaraiMasaAsal = ["02:00 PM", "05:00 PM", "08:00 PM", "10:00 PM"];

    db.ref('tempahan').on('value', (snap) => {
        const data = snap.val();
        let masaDahSah = [];
        let jumlahDahBayar = 0;

        if (data) {
            Object.values(data).forEach(t => {
                if (t.status === "Dah Bayar") {
                    masaDahSah.push(t.masa);
                    jumlahDahBayar++;
                }
            });
        }

        document.getElementById('bakiSlot').innerText = (5 - jumlahDahBayar) + "/5";
        const selectMasa = document.getElementById('slotMasa');
        selectMasa.innerHTML = "";
        
        senaraiMasaAsal.forEach(m => {
            if (!masaDahSah.includes(m)) {
                let opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                selectMasa.appendChild(opt);
            }
        });

        if (5 - jumlahDahBayar <= 0) {
            document.getElementById('btnTempah').disabled = true;
            document.getElementById('btnTempah').innerText = "Slot Penuh";
        }
    });

    function prosesTempahan() {
        const nama = document.getElementById('nama').value.trim();
        if (nama.toLowerCase() === "adminpro") {
            document.getElementById('adminBox').style.display = "block";
            return;
        }
        if (!nama) return alert("Isi nama!");

        const info = {
            nama: nama,
            servis: document.getElementById('servis').value,
            masa: document.getElementById('slotMasa').value,
            status: "Belum Bayar",
            waktu: new Date().toLocaleString()
        };

        db.ref('tempahan').push(info).then(() => {
            const msg = `Salam, saya ${nama}. Booking ${info.servis} pukul ${info.masa}.`;
            window.open(`https://wa.me/601118680063?text=${encodeURIComponent(msg)}`);
            location.reload();
        });
    }

    function checkAdmin() {
        if (document.getElementById('passInput').value === "admin123") {
            document.getElementById('loginAdmin').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            loadAdmin();
        }
    }

    function loadAdmin() {
        db.ref('tempahan').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const t = data[id];
                    const isDah = t.status === "Dah Bayar";
                    html += `
                        <div class="booking-card ${isDah ? 'status-dah' : ''}">
                            <div class="status-line"></div>
                            <div>
                                <strong>${t.nama}</strong><br><small>${t.masa}</small><br>
                                ${!isDah ? `<button class="btn-confirm" onclick="confirmBayar('${id}')">Sahkan ✅</button>` : ''}
                            </div>
                            <span class="badge ${isDah ? 'bg-success' : 'bg-orange'}">${t.status}</span>
                        </div>`;
                });
            }
            document.getElementById('senaraiNama').innerHTML = html;
        });
    }

    function confirmBayar(id) {
        db.ref('tempahan/' + id).update({ status: "Dah Bayar" });
    }
</script>
</body>
</html>
