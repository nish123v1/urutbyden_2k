<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Booking System</title>
    
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 450px; background: #fff; padding: 25px; border-radius: 15px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 5px; }
        .slot-info { text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 20px; font-size: 0.9em; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Spinner */
        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Admin Section */
        .admin-panel { display: none; margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .booking-card { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 0.85em; }
        .reset-btn { background: var(--danger); }
        .status-tag { font-size: 0.7em; background: #ffeaa7; padding: 2px 8px; border-radius: 10px; float: right; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="bookingForm">
        <h2>Urut & Bekam Pro</h2>
        <div class="slot-info">Baki Slot Hari Ini: <span id="bakiSlot">Checking...</span></div>
        
        <label>Nama Anda:</label>
