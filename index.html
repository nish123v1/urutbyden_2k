<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Premium Mobile Booking</title>
    
    <style>
        /* --- CSS PREMIMUM INTERNASIONAL --- */
        :root {
            /* Palette warna premium: Hijau Emerald, Kelabu Gelap, & Emas Lembut */
            --primary: #059669; /* Hijau Emerald */
            --primary-hover: #047857;
            --dark: #111827; /* Near black untuk font */
            --bg-body: #f3f4f6; /* Kelabu sangat muda untuk background */
            --shadow-card: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --text-main: #374151;
            --border-ui: #e5e7eb;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-body);
            padding: 15px; 
            color: var(--text-main); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.5;
        }
        
        .container { 
            max-width: 420px; 
            width: 100%; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: var(--shadow-card); 
            transition: transform 0.2s ease;
        }

        /* Tajuk utama lebih premium (tidak bold sangat, spacing luas) */
        h2 { 
            text-align: center; 
            color: var(--dark); 
            margin-top: 0;
            margin-bottom: 10px; 
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.8em;
        }
        
        /* Baki Slot Card (Nampak premium, soft background) */
        .slot-info { 
            text-align: center; 
            font-weight: 600; 
            color: var(--primary); 
            margin-bottom: 25px; 
            background: #ecfdf5; 
            padding: 12px; 
            border-radius: 12px;
            font-size: 0.95em;
            border: 1px solid #d1fae5;
        }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 0.85em; 
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Input & Select lebih bersih (tanpa border hitam pekat) */
        input, select { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 18px; 
            border: 1px solid var(--border-ui); 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none;
            display: block; 
            color: var(--text-main);
            background: #fdfdfd;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        input:focus, select:focus { 
            border-color: #a7f3d0;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        /* Butang Tempah Utama (Bold tapi rounded lembut) */
        button { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 15px; 
            border: 1px solid transparent; 
            border-radius: 12px; 
            font-size: 16px; 
            display: block;
            background: var(--primary); 
            color: white; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { background: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #d1d5db; cursor: not-allowed; opacity: 0.7; }

        /* --- ADMIN SECTION STYLES (Clean & Structured) --- */
        .admin-panel { display: none; margin-top: 35px; border-top: 1px solid #eee; padding-top: 25px; }
        .admin-panel h3 { text-align: center; color: var(--dark); margin-top: 0; font-weight: 600; }
        
        .booking-card { 
            background: #fff; 
            border: 1px solid var(--border-ui);
            padding: 18px; 
            margin-bottom: 12px; 
            border-radius: 12px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        
        /* Indikator Status di Tepi Kiri (Minimalis) */
        .card-details { border-left: 4px solid #f97316; padding-left: 15px; } /* Default Belum Bayar (Oren) */
        .booking-card.status-dah .card-details { border-left-color: var(--primary); }
        
        .card-client-info { color: var(--text-main); }
        .card-meta { font-size: 0.8em; color: #9ca3af; margin-top: 4px; }
        
        /* Badge Status (Premium tags) */
        .badge { 
            font-size: 0.7em; 
            padding: 4px 10px; 
            border-radius: 20px; 
            color: white; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bg-warning { background: #f97316; } /* Oren Premium */
        .bg-success { background: var(--primary); }

        .btn-confirm { 
            background: #fff; 
            color: var(--primary);
            border: 1px solid var(--primary);
            font-size: 11px; 
            padding: 6px 12px; 
            margin-top: 8px; 
            width: auto; 
            display: inline-block;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-confirm:hover { background: #ecfdf5; }
