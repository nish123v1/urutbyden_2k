<head>
  
  <style>
  body {
    background-color: #121212; /* Tukar jadi Dark Mode */
    color: white;              /* Tulisan jadi putih */
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }

  input, select, button {
    width: 100%;             /* Kotak jadi panjang penuh */
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;      /* Bucu jadi bulat sikit */
    border: 1px solid #444;
    background-color: #222;
    color: white;
  }

  button {
    background-color: #00ffcc; /* Warna hijau neon */
    color: black;
    font-weight: bold;
    border: none;
  }
</style>

</head>
<form onsubmit="hantarData(event)">

 <div style="display: flex; gap: 10px; justify-content: center;">

    <div>
        <img src="https://picsum.photos/200"width="150"style="border-radius: 15px;">
        <p>Taper Fade</p>
    </div>

    <div>
        <img src="https://picsum.photos/201"width="150"style="border-radius: 15px;">
        <p>Mullet</p>
    </div>

</div>

<p><i>Gaya yang tengah panas: Taper Fade dan Mullet </i></p>
<label>Nama Anda:</label><br>
<input type="text" placeholder="Masukkan nama..."><br><br>

<label>Tarikh Booking:</label><br>
<input type="date"><br><br>

<label>Jenis Potongan:</label><br>
<select>
  <option>Mullet</option>
  <option>Side Part</option>
  <option>Buzz Cut</option>
  <option>taper mid fade</option>
  <option>taper high fade</option>
   <option>taper low fade</option>
</form>
</select>
<br><br>

   <button type="submit">Hantar Tempahan</button>
   <p id="mesej-berjaya" style="color: #00ffcc; font-weight: bold; margin-top: 20px;"></p>

<script>
 function hantarData(event) {
    event.preventDefault(); 
    
    let nama = document.querySelector('input[type="text"]').value;
    let tempatMesej = document.getElementById("mesej-berjaya");

    if (nama === "") {
        tempatMesej.style.color = "red";
        tempatMesej.innerHTML = "Sila masukkan nama dulu!";
    } else {
        // --- TAMBAH KOD DI BAWAH INI ---
        event.target.querySelector('button').style.display = "none"; 
        // ------------------------------

        tempatMesej.style.color = "#00ffcc";
        tempatMesej.innerHTML = "Success! Tempahan untuk " + nama + " telah diterima.";
    }
}
</script>
