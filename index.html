<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Booking System</title>
    
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 450px; background: #fff; padding: 25px; border-radius: 15px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 5px; }
        .slot-info { text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 20px; font-size: 0.9em; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Spinner */
        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Admin Section */
        .admin-panel { display: none; margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .booking-card { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 0.85em; }
        .reset-btn { background: var(--danger); }
        .status-tag { font-size: 0.7em; background: #ffeaa7; padding: 2px 8px; border-radius: 10px; float: right; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="bookingForm">
        <h2>Urut & Bekam Pro</h2>
        <div class="slot-info">Baki Slot Hari Ini: <span id="bakiSlot">Checking...</span></div>
        
        <label>Nama Anda:</label>
        <input type="text" id="nama" placeholder="Taip nama (atau kod rahsia)">

        <label>Pilih Servis:</label>
        <select id="servis">
            <option value="Urut Seluruh Badan">Urut Seluruh Badan</option>
            <option value="Bekam Sunnah">Bekam Sunnah (10 Cup)</option>
            <option value="Pakej Mantap (Urut+Bekam)">Pakej Mantap (Urut+Bekam)</option>
        </select>

        <label>Pilih Waktu:</label>
        <select id="slotMasa">
            <option value="02:00 PM">02:00 PM</option>
            <option value="05:00 PM">05:00 PM</option>
            <option value="08:30 PM">08:30 PM</option>
            <option value="10:30 PM">10:30 PM</option>
        </select>

        <button id="btnTempah" onclick="prosesTempahan()">
            <span id="btnText">Tempah Sekarang</span>
            <div id="loadingIcon" class="spinner"></div>
        </button>
    </div>

    <div id="slotFullMessage" style="display:none; text-align:center; padding: 20px;">
        <h3 style="color:var(--danger);">Maaf, Slot Penuh! ❌</h3>
        <p>Sila cuba lagi esok atau hubungi admin terus.</p>
        <button onclick="location.reload()" style="background:var(--dark);">Refresh</button>
    </div>

    <div class="admin-panel" id="adminBox">
        <h3 style="text-align:center;">🛡️ Dashboard Admin</h3>
        
        <div id="loginAdmin">
            <input type="password" id="passInput" placeholder="Password Admin">
            <button onclick="checkAdmin()" style="background:var(--dark);">Masuk Sistem</button>
        </div>

        <div id="adminContent" style="display:none;">
            <p><strong>Senarai Tempahan:</strong></p>
            <div id="senaraiNama">Memuatkan data...</div>
            <button class="reset-btn" onclick="resetSistem()">Reset Semua Slot</button>
            <button onclick="location.reload()" style="background:#95a5a6; margin-top:10px;">Logout</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // 1. CONFIG FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBnP56js1YcyNg61XCnJ93aVUB0JaGonEo",
        authDomain: "urutpro-239355.firebaseapp.com",
        projectId: "urutpro-239355",
        storageBucket: "urutpro-239355.appspot.com",
        messagingSenderId: "473336835724",
        appId: "1:473336835724:web:348a6490b0051d278fd5a9",
        databaseURL: "https://urutpro-239355-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. MONITOR BAKI SLOT (REAL-TIME)
    db.ref('tempahan').on('value', (snapshot) => {
        const data = snapshot.val();
        const jumlah = data ? Object.keys(data).length : 0;
        const baki = 5 - jumlah;
        
        document.getElementById('bakiSlot').innerText = baki + "/5";

        if (baki <= 0) {
            document.getElementById('bookingForm').style.display = 'none';
            document.getElementById('slotFullMessage').style.display = 'block';
        } else {
            document.getElementById('bookingForm').style.display = 'block';
            document.getElementById('slotFullMessage').style.display = 'none';
        }
    });

    // 3. FUNGSI TEMPAH + KOD RAHSIA
    function prosesTempahan() {
        const nama = document.getElementById('nama').value.trim();
        const noWhatsApp = "601118680063"; // Nombor member kau

        // PINTU RAHSIA (Taip 'adminpro' kat kotak nama)
        if (nama.toLowerCase() === "adminpro") {
            document.getElementById('adminBox').style.display = "block";
            document.getElementById('adminBox').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('nama').value = "";
            return;
        }

        if (nama === "") return alert("Sila masukkan nama anda!");

        const servis = document.getElementById('servis').value;
        const masa = document.getElementById('slotMasa').value;

        // UI Loading
        const btn = document.getElementById('btnTempah');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loadingIcon');

        btn.disabled = true;
        btnText.innerText = "Sila Tunggu...";
        loader.style.display = "inline-block";

        // Simpan ke Firebase
        db.ref('tempahan').push({
            nama: nama,
            servis: servis,
            masa: masa,
            status: "Dah Booking",
            waktuSimpan: new Date().toLocaleString()
        }).then(() => {
            setTimeout(() => {
                const text = `Salam, saya ${nama}. Saya nak booking ${servis} pukul ${masa}.`;
                const url = `https://wa.me/${noWhatsApp}?text=${encodeURIComponent(text)}`;
                
                // Reset UI
                btn.disabled = false;
                btnText.innerText = "Tempah Sekarang";
                loader.style.display = "none";
                
                window.open(url, '_blank');
            }, 1200);
        });
    }

    // 4. FUNGSI ADMIN
    function checkAdmin() {
        const pass = document.getElementById('passInput').value;
        if (pass === "admin123") {
            document.getElementById('loginAdmin').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            loadListAdmin();
        } else {
            alert("Password Salah!");
        }
    }

    function loadListAdmin() {
        db.ref('tempahan').on('value', (snapshot) => {
            const data = snapshot.val();
            let html = "";
            if (data) {
                Object.values(data).reverse().forEach(t => {
                    html += `
                    <div class="booking-card">
                        <span class="status-tag">Dibayar</span>
                        <strong>${t.nama}</strong><br>
                        ${t.servis} | ${t.masa}<br>
                        <small style="color:#999">${t.waktuSimpan}</small>
                    </div>`;
                });
            } else {
                html = "<p style='text-align:center; color:#999;'>Tiada tempahan buat masa ini.</p>";
            }
            document.getElementById('senaraiNama').innerHTML = html;
        });
    }

    function resetSistem() {
        if (confirm("AMARAN: Ini akan memadam SEMUA tempahan dan baki slot jadi 5 balik. Teruskan?")) {
            db.ref('tempahan').remove().then(() => {
                alert("Sistem telah di-reset!");
                location.reload();
            });
        }
    }
</script>

</body>
</html>
