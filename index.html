<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khas Untuk Adawiyah ❤️</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #ff3366;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.2);
            text-align: center;
            width: 320px;
            z-index: 10;
        }

        h1 {
            color: #ff3366;
            margin-bottom: 30px;
            font-size: 24px;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8b949e;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
            color: #c9d1d9;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #ff3366;
            box-shadow: 0 0 5px rgba(255, 51, 102, 0.5);
        }

        button {
            width: 100%;
            background-color: transparent;
            border: 1px solid #ff3366;
            color: #ff3366;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #ff3366;
            color: #0d1117;
            box-shadow: 0 0 15px #ff3366;
        }

        #message {
            margin-top: 15px;
            color: #f85149;
        }

        .hidden {
            display: none !important;
        }

        #success-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        #heart-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .main-love-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            z-index: 100;
            margin: 0;
            text-align: center;
            width: 90%;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        .heart-text {
            position: absolute;
            font-size: 10px;
            color: #ff3366;
            opacity: 0;
            transform: translate(-50%, -50%);
            animation: twinkleHeart 3s ease-in-out infinite;
        }

        @keyframes twinkleHeart {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); text-shadow: 0 0 5px #ff3366; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div id="login-container" class="container">
        <h1>ACCESS PROTOCOL</h1>
        <form id="login-form">
            <div class="input-group">
                <label for="username">IDENTIFICATION:</label>
                <input type="text" id="username" name="username" placeholder="Masukkan nama..." autocomplete="off" required>
            </div>
            <div class="input-group">
                <label for="password">ACCESS KEY:</label>
                <input type="password" id="password" name="password" placeholder="••••" required>
            </div>
            <button type="submit">DECRYPT SYSTEM</button>
        </form>
        <p id="message"></p>
    </div>

    <div id="success-container" class="hidden">
        <div id="heart-wrapper"></div>
        <h1 class="main-love-text">Love you, Adawiyah.</h1>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const loginContainer = document.getElementById('login-container');
            const successContainer = document.getElementById('success-container');
            const heartWrapper = document.getElementById('heart-wrapper');
            const message = document.getElementById('message');

            const validUsername = 'adawiyah'; 
            const validPassword = '123';      

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); 

                const username = loginForm.username.value.toLowerCase().trim();
                const password = loginForm.password.value;

                if (username === validUsername && password === validPassword) {
                    message.textContent = '';
                    loginContainer.classList.add('hidden');
                    successContainer.classList.remove('hidden');
                    generateHeart(); 
                } else {
                    message.textContent = 'Akses ditolak. Cuba lagi, sayang.'; 
                }
            });

            function generateHeart() {
                const totalText = 350; 
                const heartWrapperRect = heartWrapper.getBoundingClientRect();
                const centerX = heartWrapperRect.width / 2;
                const centerY = heartWrapperRect.height / 2;
                
                // Formula Auto-scale agar muat di skrin phone & PC secara automatik
                const scale = Math.min(heartWrapperRect.width, heartWrapperRect.height) / 45; 

                heartWrapper.innerHTML = ''; 

                for (let i = 0; i < totalText; i++) {
                    const span = document.createElement('span');
                    span.textContent = 'i love you';
                    span.classList.add('heart-text');

                    const t = (i / totalText) * 2 * Math.PI;
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)); 

                    const finalX = centerX + x * scale;
                    const finalY = centerY + y * scale;

                    span.style.left = `${finalX}px`;
                    span.style.top = `${finalY}px`;

                    const delay = Math.random() * 3;
                    span.style.animationDelay = `${delay}s`;

                    heartWrapper.appendChild(span);
                }

                heartWrapper.style.animation = "heartbeat 2.5s infinite ease-in-out";
            }
        });
    </script>
</body>
</html>
