<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Booking System</title>
    
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 15px; }
        .container { max-width: 450px; background: #fff; padding: 20px; border-radius: 15px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .slot-info { text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Admin Dashboard Styles */
        .admin-panel { display: none; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .booking-card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 10px; position: relative; }
        .status-belum { border-left: 8px solid var(--warning); }
        .status-dah { border-left: 8px solid var(--primary); }
        
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 5px; color: white; float: right; }
        .bg-warning { background: var(--warning); }
        .bg-success { background: var(--primary); }

        .btn-confirm { background: var(--dark); font-size: 12px; padding: 8px; margin-top: 10px; width: auto; display: inline-block; }
        .reset-btn { background: var(--danger); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="bookingForm">
        <h2 style="text-align:center;">Urut & Bekam Pro</h2>
        <div class="slot-info">Baki Slot: <span id="bakiSlot">...</span></div>
        
        <label>Nama:</label>
        <input type="text" id="nama" placeholder="Taip nama / kod rahsia">

        <label>Servis:</label>
        <select id="servis">
            <option value="Urut Badan">Urut Badan</option>
            <option value="Bekam">Bekam Sunnah</option>
        </select>

        <label>Waktu:</label>
        <select id="slotMasa">
            <option value="02:00 PM">02:00 PM</option>
            <option value="08:00 PM">08:00 PM</option>
        </select>

        <button id="btnTempah" onclick="prosesTempahan()">
            <span id="btnText">Tempah & WhatsApp</span>
            <div id="loadingIcon" class="spinner"></div>
        </button>
    </div>

    <div class="admin-panel" id="adminBox">
        <h3 style="text-align:center;">🛡️ Admin Dashboard</h3>
        
        <div id="loginAdmin">
            <input type="password" id="passInput" placeholder="Password Admin">
            <button onclick="checkAdmin()" style="background:var(--dark);">Login</button>
        </div>

        <div id="adminContent" style="display:none;">
            <p><strong>Senarai Tempahan:</strong></p>
            <div id="senaraiNama">Memuatkan...</div>
            <button class="reset-btn" onclick="resetSistem()">Reset Semua Data</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // 1. CONFIG (PASTIKAN GUNA CONFIG KAU)
    const firebaseConfig = {
        apiKey: "AIzaSyBnP56js1YcyNg61XCnJ93aVUB0JaGonEo",
        authDomain: "urutpro-239355.firebaseapp.com",
        projectId: "urutpro-239355",
        storageBucket: "urutpro-239355.appspot.com",
        messagingSenderId: "473336835724",
        appId: "1:473336835724:web:348a6490b0051d278fd5a9",
        databaseURL: "https://urutpro-239355-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. UPDATE BAKI SLOT
    db.ref('tempahan').on('value', (snap) => {
        const data = snap.val();
        const baki = 5 - (data ? Object.keys(data).length : 0);
        document.getElementById('bakiSlot').innerText = baki + "/5";
    });

    // 3. PROSES TEMPAHAN
    function prosesTempahan() {
        const nama = document.getElementById('nama').value.trim();
        const noWA = "601118680063"; 

        if (nama.toLowerCase() === "adminpro") {
            document.getElementById('adminBox').style.display = "block";
            document.getElementById('adminBox').scrollIntoView();
            return;
        }

        if(!nama) return alert("Nama wajib isi!");

        const btn = document.getElementById('btnTempah');
        btn.disabled = true;
        document.getElementById('loadingIcon').style.display = "inline-block";

        const dataTempahan = {
            nama: nama,
            servis: document.getElementById('servis').value,
            masa: document.getElementById('slotMasa').value,
            status: "Belum Bayar", // Status asal
            waktu: new Date().toLocaleString()
        };

        db.ref('tempahan').push(dataTempahan).then(() => {
            const text = `Salam, saya ${nama}. Dah booking ${dataTempahan.servis} pukul ${dataTempahan.masa}. Nak bayar kat mana ya?`;
            window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(text)}`, '_blank');
            location.reload();
        });
    }

    // 4. ADMIN LOGIC
    function checkAdmin() {
        if(document.getElementById('passInput').value === "admin123") {
            document.getElementById('loginAdmin').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            loadAdminData();
        } else { alert("Salah!"); }
    }

    function loadAdminData() {
        db.ref('tempahan').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            if(data) {
                Object.keys(data).forEach(id => {
                    const t = data[id];
                    const isDah = t.status === "Dah Bayar";
                    html += `
                        <div class="booking-card ${isDah ? 'status-dah' : 'status-belum'}">
                            <span class="badge ${isDah ? 'bg-success' : 'bg-warning'}">${t.status}</span>
                            <strong>${t.nama}</strong><br>
                            ${t.servis} (${t.masa})<br>
                            ${!isDah ? `<button class="btn-confirm" onclick="confirmBayar('${id}')">Confirm Bayar ✅</button>` : ''}
                        </div>`;
                });
            } else { html = "Tiada data."; }
            document.getElementById('senaraiNama').innerHTML = html;
        });
    }

    // FUNGSI PENTING: UPDATE STATUS
    function confirmBayar(id) {
        if(confirm("Confirm pelanggan ni dah bayar?")) {
            db.ref('tempahan/' + id).update({
                status: "Dah Bayar"
            });
        }
    }

    function resetSistem() {
        if(confirm("Padam semua?")) db.ref('tempahan').remove().then(() => location.reload());
    }
</script>
</body>
</html>
