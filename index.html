<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrutPro - Booking System</title>
    
    <style>
        /* --- CSS ASAL & MODIFIKASI --- */
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 400px; background: #fff; padding: 20px; border-radius: 10px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Gaya Loading Spinner */
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-loading { display: flex; align-items: center; justify-content: center; opacity: 0.8; }

        /* Admin Panel (Hidden by default) */
        .admin-panel { display: none; margin-top: 30px; padding: 15px; border-top: 2px dashed #ccc; background: #f9f9f9; }
        .reset-btn { background: #e74c3c; margin-top: 10px; }
        .booking-list { text-align: left; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="bookingForm">
    <h2>Tempahan Urut & Bekam</h2>
    
    <label>Nama Anda:</label>
    <input type="text" id="nama" placeholder="Masukkan nama penuh">

    <label>Jenis Servis:</label>
    <select id="servis">
        <option value="Urut Belikat">Urut Belikat</option>
        <option value="Bekam Sunnah">Bekam Sunnah</option>
        <option value="Pakej Urut + Bekam">Pakej Urut + Bekam</option>
        <option value="Urut Tangan">Urut Tangan</option>
    </select>

    <label>Pilih Waktu:</label>
    <select id="slotMasa">
        <option value="02:00 PM - 04:00 PM">02:00 PM - 04:00 PM</option>
        <option value="05:00 PM - 07:00 PM">05:00 PM - 07:00 PM</option>
        <option value="08:00 PM - 10:00 PM">08:00 PM - 10:00 PM</option>
        <option value="10:00 PM - 12:00 AM">10:00 PM - 12:00 AM</option>
    </select>

    <button id="btnTempah" onclick="prosesTempahan()">
        <span id="btnText">Tempah Sekarang (WhatsApp)</span>
        <div id="loadingIcon" class="spinner"></div>
    </button>

    <div id="slotFullMessage" style="display:none; text-align:center; color:red;">
        <h3>Maaf, slot hari ini sudah penuh! ❌</h3>
    </div>
</div>

<div class="container admin-panel" id="adminBox">
    <h3>Panel Admin</h3>
    
    <div id="loginAdmin">
        <input type="password" id="passInput" placeholder="Masukkan Password Admin">
        <button onclick="checkAdmin()" style="background:#34495e;">Login Admin</button>
    </div>

    <div id="adminContent" style="display:none;">
        <p>Senarai Tempahan Hari Ini:</p>
        <div id="senaraiNama" class="booking-list">Memuatkan senarai...</div>
        <button class="reset-btn" onclick="resetSistem()">Reset Slot Harian</button>
        <button onclick="logoutAdmin()" style="background:#95a5a6; margin-top:10px;">Logout</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // 1. CONFIG FIREBASE (GANTI DENGAN KAU PUNYA)
    const firebaseConfig = {
        apiKey: "AIzaSyBnP56js1YcyNg61XCnJ93aVUB0JaGonEo",
        authDomain: "urutpro-239355.firebaseapp.com",
        projectId: "urutpro-239355",
        storageBucket: "urutpro-239355.appspot.com",
        messagingSenderId: "473336835724",
        appId: "1:473336835724:web:348a6490b0051d278fd5a9",
        databaseURL: "https://urutpro-239355-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. FUNGSI PROSES TEMPAHAN + KOD RAHSIA
    function prosesTempahan() {
        const nama = document.getElementById('nama').value;
        const noWhatsApp = "601118680063"; // Nombor member kau

        // --- PINTU RAHSIA ---
        if (nama.toLowerCase() === "adminpro") {
            document.getElementById('adminBox').style.display = "block";
            document.getElementById('adminBox').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('nama').value = "";
            return;
        }

        if (nama.trim() === "") return alert("Isi nama dulu bos!");

        const servis = document.getElementById('servis').value;
        const masaPilihan = document.getElementById('slotMasa').value;

        // Start Loading Animation
        const btn = document.getElementById('btnTempah');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');

        btn.classList.add('btn-loading');
        btnText.innerText = "Tengah Proses...";
        loadingIcon.style.display = "inline-block";
        btn.disabled = true;

        // Simpan Data
        db.ref('tempahan').push({
            nama: nama,
            servis: servis,
            slotMasa: masaPilihan,
            timestamp: Date.now()
        }).then(() => {
            setTimeout(() => {
                const mesej = `Salam, saya ${nama}. Nak tempah ${servis} pukul ${masaPilihan}.`;
                const url = "https://wa.me/" + noWhatsApp + "?text=" + encodeURIComponent(mesej);
                
                // Reset Button
                btn.classList.remove('btn-loading');
                btnText.innerText = "Tempah Sekarang (WhatsApp)";
                loadingIcon.style.display = "none";
                btn.disabled = false;

                window.open(url, '_blank');
            }, 1500);
        });
    }

    // 3. FUNGSI ADMIN
    function checkAdmin() {
        const pass = document.getElementById('passInput').value;
        if (pass === "admin123") { // Password kau
            document.getElementById('loginAdmin').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            loadTempahan();
        } else {
            alert("Password Salah!");
        }
    }

    function loadTempahan() {
        db.ref('tempahan').on('value', (snapshot) => {
            const data = snapshot.val();
            let html = "";
            if (data) {
                Object.values(data).forEach(t => {
                    html += `- ${t.nama} (${t.servis} @ ${t.slotMasa})<br>`;
                });
            } else {
                html = "Tiada tempahan hari ini.";
            }
            document.getElementById('senaraiNama').innerHTML = html;
        });
    }

    function resetSistem() {
        if (confirm("Betul ke nak reset semua data?")) {
            db.ref('tempahan').remove().then(() => {
                alert("Sistem Berjaya di Reset!");
                location.reload();
            });
        }
    }

    function logoutAdmin() {
        location.reload();
    }
</script>

</body>
</html>
